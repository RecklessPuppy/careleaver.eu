name: Site checks

on:
  push:
  workflow_dispatch:
    inputs:
      broad_outreach_readiness:
        description: "Run the optional gate for broad outreach readiness"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: read

jobs:
  static-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Run static site checks
        shell: bash
        run: python3 scripts/check-site.py

      - name: Run broad outreach readiness gate
        if: github.event_name == 'workflow_dispatch' && inputs.broad_outreach_readiness == 'true'
        shell: bash
        run: python3 scripts/check-site.py --readiness

      - name: Run external link smoke check
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            python3 scripts/check-site.py --external --soft-external
          else
            python3 scripts/check-site.py --external
          fi
